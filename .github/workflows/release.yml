name: Test and release

# Run the workflow when a Pull Request is opened or when changes are pushed to master
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest

    strategy:
      matrix:
        # Run the steps below with the following versions of Node.js
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 11

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  release:
    strategy:
      matrix:
        node-version: [22.x]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    needs: [test]
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 11

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Disable GPG signing in CI
        run: git config --global commit.gpgsign false

      - name: Create Release Pull Request or Publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          has_changesets=false
          if compgen -G ".changeset/*.md" > /dev/null; then
            if ls .changeset/*.md | grep -qv ".changeset/README.md"; then
              has_changesets=true
            fi
          fi

          if [ "$has_changesets" = "true" ]; then
            pnpm changeset version

            if [ -z "$(git status --porcelain)" ]; then
              echo "No version changes detected after changeset version."
              exit 0
            fi

            branch="changeset-release/main"
            git checkout -B "$branch"
            git add -A
            git commit -m "Version packages"
            git push --force-with-lease --set-upstream origin "$branch"

            pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
            if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
              echo "Release PR #$pr_number already exists."
            else
              gh pr create \
                --base main \
                --head "$branch" \
                --title "Version packages" \
                --body "This PR was created automatically by the release workflow."
            fi
          else
            pnpm release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
