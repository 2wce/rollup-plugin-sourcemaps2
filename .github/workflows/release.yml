name: Test and release

# Run the workflow when a Pull Request is opened or when changes are pushed to master
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      matrix:
        # Run the steps below with the following versions of Node.js
        node-version: [20.x, 22.x]

    steps:
      # Fetch the latest commit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Setup Node.js using the appropriate version
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}

      # Install package dependencies
      - name: Install
        run: npm ci

      # Run build
      - name: Build
        run: yarn build

      # Run tests
      - name: Test
        run: yarn test

      # - name: Coveralls
      #   uses: coverallsapp/github-action@v2
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}

  release:
    strategy:
      matrix:
        # Run the steps below with the following versions of Node.js
        node-version: [22.x]

    # Only release on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest

    # Waits for test jobs for each Node.js version to complete
    needs: [test]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Setup Node.js using the appropriate version
      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      # Install package dependencies
      - name: Install
        run: npm ci

      # Build the package
      - name: Build
        run: yarn build

      - name: Disable GPG signing in CI
        run: git config --global commit.gpgsign false

      # Creates/updates a release PR when changesets exist.
      # Publishes to npm when there are no pending changesets (e.g. after release PR merge).
      - name: Create Release Pull Request or Publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          has_changesets=false
          if compgen -G ".changeset/*.md" > /dev/null; then
            if ls .changeset/*.md | grep -qv ".changeset/README.md"; then
              has_changesets=true
            fi
          fi

          if [ "$has_changesets" = "true" ]; then
            yarn changeset version

            if [ -z "$(git status --porcelain)" ]; then
              echo "No version changes detected after changeset version."
              exit 0
            fi

            branch="changeset-release/main"
            git checkout -B "$branch"
            git add -A
            git commit -m "Version packages"
            git push --force-with-lease --set-upstream origin "$branch"

            pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
            if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
              echo "Release PR #$pr_number already exists."
            else
              gh pr create \
                --base main \
                --head "$branch" \
                --title "Version packages" \
                --body "This PR was created automatically by the release workflow."
            fi
          else
            yarn release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
