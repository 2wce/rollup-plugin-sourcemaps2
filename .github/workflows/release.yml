name: Test and release

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  release-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    needs: [test]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Disable GPG signing in CI
        run: git config --global commit.gpgsign false

      - name: Check for changesets and create release PR
        id: changesets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          has_changesets=false
          if compgen -G ".changeset/*.md" > /dev/null; then
            if ls .changeset/*.md | grep -qv ".changeset/README.md"; then
              has_changesets=true
            fi
          fi

          echo "has_changesets=$has_changesets" >> "$GITHUB_OUTPUT"

          if [ "$has_changesets" = "true" ]; then
            pnpm changeset version

            if [ -z "$(git status --porcelain)" ]; then
              echo "No version changes detected after changeset version."
              exit 0
            fi

            branch="changeset-release/main"
            git checkout -B "$branch"
            git add -A
            git commit -m "Version packages"
            git push --force-with-lease --set-upstream origin "$branch"

            pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
            if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
              echo "Release PR #$pr_number already exists."
            else
              gh pr create \
                --base main \
                --head "$branch" \
                --title "Version packages" \
                --body "This PR was created automatically by the release workflow."
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      has_changesets: ${{ steps.changesets.outputs.has_changesets }}

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-pr.outputs.has_changesets == 'false'
    runs-on: macos-latest
    needs: [test, release-pr]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
